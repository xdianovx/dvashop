services:
  app:
    build:
      context: .
      dockerfile: docker/local/php/Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    image: dvashop-php:local
    container_name: dvashop_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dvashop

  nginx:
    image: nginx:1.27-alpine
    container_name: dvashop_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/local/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - dvashop

  node:
    image: node:24-alpine
    container_name: dvashop_node
    working_dir: /var/www/html
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PORT: ${VITE_PORT:-5173}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    networks:
      - dvashop

  queue:
    image: dvashop-php:local
    container_name: dvashop_queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'Waiting for Composer dependencies...'; sleep 5; done; php artisan queue:work --queue=default,imports,imports-images --sleep=3 --tries=3 --timeout=90"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    networks:
      - dvashop

  scheduler:
    image: dvashop-php:local
    container_name: dvashop_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'Waiting for Composer dependencies...'; sleep 5; done; while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    networks:
      - dvashop

  mysql:
    image: mysql:8.4
    container_name: dvashop_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dvashop}
      MYSQL_USER: ${DB_USERNAME:-dvashop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dvashop}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_FORWARD_PORT:-33066}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dvashop

  redis:
    image: redis:7-alpine
    container_name: dvashop_redis
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    networks:
      - dvashop

  mailpit:
    image: axllent/mailpit:latest
    container_name: dvashop_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - dvashop

  adminer:
    image: adminer:latest
    container_name: dvashop_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dvashop

networks:
  dvashop:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  node_modules:
